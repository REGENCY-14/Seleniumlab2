# Selenium Test Automation Configuration

# ============================================
# Application Configuration
# ============================================
# Base URL for the application under test
baseUrl=https://www.globalsqa.com/angularJs-protractor/BankingProject/#/login

# ============================================
# Browser Configuration
# ============================================
# Browser type for test execution
# Supported values: chrome, firefox, edge
browser=chrome

# ============================================
# Headless Mode Configuration
# ============================================
# Run tests in headless mode (true/false)
# Useful for CI/CD pipelines
headless=false

# ============================================
# Chrome Browser Options
# ============================================
# Remote allow origins for WebDriver
chromeRemoteAllowOrigins=--remote-allow-origins=*

# Disable extensions
chromeDisableExtensions=--disable-extensions

# Disable popup blocking
chromeDisablePopupBlocking=--disable-popup-blocking

# No first run
chromeNoFirstRun=--no-first-run

# No default browser check
chromeNoDefaultBrowserCheck=--no-default-browser-check

# Disable dev shm usage (useful for Linux systems)
chromeDisableDevShmUsage=--disable-dev-shm-usage

# ============================================
# Headless Mode Specific Options
# ============================================
# Headless mode
chromeHeadless=--headless=new

# No sandbox
chromeNoSandbox=--no-sandbox

# Disable GPU
chromeDisableGpu=--disable-gpu

# Window size for headless mode
chromeWindowSize=--window-size=1920,1080

# ============================================
# Timeout Configuration (in seconds)
# ============================================
# Explicit wait timeout
explicitWaitTimeout=10

# Page load timeout
pageLoadTimeout=30

# Script timeout
scriptTimeout=30

# ============================================
# Test Execution Configuration
# ============================================
# Screenshot on failure
takeScreenshotOnFailure=true

# Video recording enabled
videoRecordingEnabled=false
